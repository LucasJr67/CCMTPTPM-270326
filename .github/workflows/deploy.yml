name: CI/CD Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CONTAINER_PORT: 80

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: prep
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Thiếu secret DOCKERHUB_USERNAME."
            exit 1
          fi

          IMAGE_REPO=$(echo "${DOCKERHUB_USERNAME}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_repo }}:latest
            ${{ steps.prep.outputs.image_repo }}:${{ github.sha }}

      - name: Triển khai lên DevOps Classroom
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          IMAGE_REPO: ${{ steps.prep.outputs.image_repo }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "Thiếu secret DEPLOY_URL."
            exit 1
          fi

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$DEPLOY_URL?repo=${IMAGE_REPO}&tag=latest&slot=5&container_port=${CONTAINER_PORT}&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
